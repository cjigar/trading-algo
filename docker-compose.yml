services:
  db:
    # TimescaleDB (a superset of stock PG16): hypertables, compression, retention policies and
    # continuous aggregates for the option-chain snapshot series. Same major version, same volume.
    image: timescale/timescaledb-ha:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-algo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-algo}
      POSTGRES_DB: ${POSTGRES_DB:-algo}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-algo} -d ${POSTGRES_DB:-algo}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Bound to localhost by default (never exposed publicly — Docker port publishing bypasses
      # ufw). Local dev and the test suite connect here; 55432 avoids clashing with a
      # system Postgres on 5432. Override with DB_PORT / DB_BIND_ADDR.
      - "${DB_BIND_ADDR:-127.0.0.1:}${DB_PORT:-55432}:5432"

  algo:
    build:
      context: .
      args:
        INSTALL_BROKER: ${INSTALL_BROKER:-0}
    image: algo-trading:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Overrides ALGO_DATABASE_URL from .env — in containers the loop talks to the db service.
      ALGO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-algo}:${POSTGRES_PASSWORD:-algo}@db:5432/${POSTGRES_DB:-algo}
    volumes:
      - ./scrip_cache:/app/scrip_cache
      - ./logs:/app/logs
    command: ["python", "-m", "algo_trading.entrypoints.run_algo"]

  # FastAPI backend — read/control-only over the shared Postgres (no broker session).
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: algo-api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ALGO_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-algo}:${POSTGRES_PASSWORD:-algo}@db:5432/${POSTGRES_DB:-algo}
      WEB_AUTH_PASSWORD: ${WEB_AUTH_PASSWORD:-changeme}
      WEB_AUTH_SECRET: ${WEB_AUTH_SECRET:-dev-insecure-secret-change-me}
      WEB_CORS_ORIGINS: ${WEB_CORS_ORIGINS:-http://localhost:3000,http://localhost:3001}
    ports:
      # On a public server set BIND_ADDR=127.0.0.1: in .env so this binds to localhost only
      # (Docker port publishing bypasses ufw). The proxy reaches api over the internal network.
      - "${BIND_ADDR:-}8000:8000"

  # Next.js web app (replaces the Streamlit dashboard once at parity).
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # No colon in the default: `:-` would substitute for an *empty* value too, re-pinning
        # the bundle to localhost:8000 and defeating the same-origin resolution in lib/api.ts.
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE-}
    image: algo-web:latest
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "${BIND_ADDR:-}3001:3000"

volumes:
  pgdata:
